<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#3c7a4c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="description" content="See how your plants are doing.">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" href="favicon.png">
<title>Dashboard &middot; Plant Tracker</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="config.js"></script>

<div id="configBanner" class="config-banner" style="display:none;">
  Supabase isn't configured yet — edit the keys at the top of config.js.
</div>

<nav class="topnav">
  <a href="index.html">Log</a>
  <a href="dashboard.html" class="active">Dashboard</a>
</nav>

<div class="dash-wrap">
  <div class="dash-header">
    <h1>Your plants</h1>
    <p>Sorted by whoever's thirstiest.</p>
    <button class="refresh-btn" id="refreshBtn" type="button" aria-label="Refresh">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M20 11A8 8 0 105.5 6.5M4 4v5h5M4 13a8 8 0 0014.5 4.5M20 20v-5h-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>

  <div id="dueSection" style="display:none;">
    <div class="section-title" style="margin-top:0;">Due for watering</div>
    <div class="due-list" id="dueList"></div>
  </div>

  <div id="dashContent" role="status" aria-live="polite">
    <div class="loading-state">Loading plants&hellip;</div>
  </div>

  <div id="heatmapSection" style="display:none;">
    <div class="section-title">Last 12 weeks</div>
    <div class="heatmap-card">
      <div id="heatmapGrid" class="heatmap-grid"></div>
      <div class="heatmap-legend">
        <span>Less</span>
        <span class="hm-cell hm-0"></span>
        <span class="hm-cell hm-1"></span>
        <span class="hm-cell hm-2"></span>
        <span class="hm-cell hm-3"></span>
        <span>More</span>
      </div>
    </div>
  </div>

  <div id="activitySection" style="display:none;">
    <div class="section-title">Recent activity</div>
    <div class="activity-list" id="activityList"></div>
  </div>

  <div class="section-title">Watering schedule</div>
  <div class="schedule-card">
    <div class="schedule-list" id="scheduleList"></div>
    <div class="schedule-add">
      <input type="text" id="newPlantName" placeholder="New plant name">
      <input type="number" id="newPlantInterval" placeholder="Days" min="1" max="365" value="3">
      <button id="addPlantBtn" type="button">Add</button>
    </div>
    <div class="schedule-status" id="scheduleStatus">&nbsp;</div>
  </div>
</div>

<script>
  const dashContent = document.getElementById('dashContent');
  const activitySection = document.getElementById('activitySection');
  const activityList = document.getElementById('activityList');
  const refreshBtn = document.getElementById('refreshBtn');
  const dueSection = document.getElementById('dueSection');
  const dueList = document.getElementById('dueList');
  const heatmapSection = document.getElementById('heatmapSection');
  const heatmapGrid = document.getElementById('heatmapGrid');
  const scheduleList = document.getElementById('scheduleList');
  const scheduleStatus = document.getElementById('scheduleStatus');
  const newPlantName = document.getElementById('newPlantName');
  const newPlantInterval = document.getElementById('newPlantInterval');
  const addPlantBtn = document.getElementById('addPlantBtn');

  const LEAF_ICON = `
    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 2C12 2 5 10.5 5 15C5 18.866 8.13401 22 12 22C15.866 22 19 18.866 19 15C19 10.5 12 2 12 2Z" fill="currentColor"/>
    </svg>`;

  function renderConfigWarning(){
    document.getElementById('configBanner').style.display = 'block';
    dashContent.innerHTML = `
      <div class="empty-state">
        Supabase isn't configured yet, so there's nothing to show. Edit config.js to connect a project.
      </div>`;
    dueSection.style.display = 'none';
    heatmapSection.style.display = 'none';
    activitySection.style.display = 'none';
  }

  function renderEmptyState(){
    dashContent.innerHTML = `
      <div class="empty-state">
        <div class="icon">${LEAF_ICON}</div>
        <div>No waterings logged yet.<br>Tap a pot to get started.</div>
      </div>`;
    dueSection.style.display = 'none';
    heatmapSection.style.display = 'none';
  }

  function renderErrorState(){
    dashContent.innerHTML = `
      <div class="empty-state">
        Couldn't load your plants. Check your connection and refresh.
      </div>`;
    dueSection.style.display = 'none';
    heatmapSection.style.display = 'none';
  }

  // The due strip: overdue plants, most-overdue first, each with a
  // one-tap "Water now" link straight to the log page for that plant.
  function renderDue(plants){
    const due = plants.filter(p => p.overdue);
    if(due.length === 0){
      dueSection.style.display = 'none';
      return;
    }
    dueSection.style.display = 'block';
    dueList.innerHTML = '';
    for(const p of due){
      const row = document.createElement('div');
      row.className = 'due-item';
      row.innerHTML = `
        <div class="due-info">
          <span class="due-name">${escapeHtml(prettifyPlantName(p.plantId))}</span>
          <span class="due-meta">Last watered ${formatRelativeTime(p.lastWatered)} &middot; every ${p.interval} day${p.interval === 1 ? '' : 's'}</span>
        </div>
        <a class="water-now-btn" href="index.html?plant=${encodeURIComponent(p.plantId)}">Water now</a>
      `;
      dueList.appendChild(row);
    }
  }

  function renderPlants(plants){
    dashContent.innerHTML = `<div class="plant-grid"></div>`;
    const grid = dashContent.querySelector('.plant-grid');

    for(const p of plants){
      const card = document.createElement('div');
      card.className = 'plant-card' + (p.overdue ? ' overdue' : '');

      const metaText = p.overdue
        ? `Needs water &middot; last watered ${formatRelativeTime(p.lastWatered)}`
        : `Last watered ${formatRelativeTime(p.lastWatered)} &middot; every ${p.interval}d`;

      card.innerHTML = `
        <div class="info">
          <span class="name">${escapeHtml(prettifyPlantName(p.plantId))}</span>
          <span class="meta${p.overdue ? ' overdue-text' : ''}">${metaText}</span>
        </div>
        <div class="stats">
          <div class="stat streak">
            <span class="value">${p.streak}</span>
            <span class="label">Streak</span>
          </div>
          <div class="stat">
            <span class="value">${p.bestStreak}</span>
            <span class="label">Best</span>
          </div>
          <div class="stat">
            <span class="value">${p.total}</span>
            <span class="label">Total</span>
          </div>
        </div>
      `;
      grid.appendChild(card);
    }
  }

  // 12-week calendar heatmap, GitHub-contributions style: columns are
  // weeks, rows are days of the week, color intensity = waterings.
  function renderHeatmap(logs){
    const days = buildDailyCounts(logs, 84);
    heatmapSection.style.display = 'block';
    heatmapGrid.innerHTML = '';

    // Pad the start so the first column begins on Sunday.
    const startPad = days[0].date.getDay();
    for(let i = 0; i < startPad; i++){
      const spacer = document.createElement('span');
      spacer.className = 'hm-cell hm-empty';
      heatmapGrid.appendChild(spacer);
    }

    for(const d of days){
      const cell = document.createElement('span');
      let level = 0;
      if(d.count >= 3) level = 3;
      else if(d.count === 2) level = 2;
      else if(d.count === 1) level = 1;
      cell.className = `hm-cell hm-${level}`;
      cell.title = `${d.date.toLocaleDateString()} \u2014 ${d.count} watering${d.count === 1 ? '' : 's'}`;
      heatmapGrid.appendChild(cell);
    }
  }

  function renderActivity(logs){
    if(logs.length === 0){
      activitySection.style.display = 'none';
      return;
    }
    activitySection.style.display = 'block';
    activityList.innerHTML = '';

    for(const log of logs.slice(0, 8)){
      const item = document.createElement('div');
      item.className = 'activity-item';
      item.innerHTML = `
        <span class="who">${escapeHtml(prettifyPlantName(log.plant_id))}</span>
        <span class="when">${formatRelativeTime(log.created_at)}</span>
      `;
      activityList.appendChild(item);
    }
  }

  function showScheduleStatus(msg, isError){
    scheduleStatus.textContent = msg;
    scheduleStatus.style.color = isError ? '#b3392f' : 'var(--accent-check)';
    setTimeout(() => { scheduleStatus.textContent = '\u00A0'; }, 2500);
  }

  async function saveInterval(plantId, days, btn){
    if(!days || days < 1){
      showScheduleStatus('Enter a number of days, 1 or more.', true);
      return;
    }
    btn.disabled = true;
    btn.textContent = 'Saving...';
    try {
      const { error } = await supabaseClient
        .from('plants')
        .upsert({ plant_id: plantId, interval_days: days });
      if(error){
        console.error('Could not save interval:', error);
        showScheduleStatus("Couldn't save. Try again.", true);
      } else {
        showScheduleStatus(`Saved \u2014 ${prettifyPlantName(plantId)} every ${days}d.`, false);
      }
    } catch(err){
      console.error('Unexpected error saving interval:', err);
      showScheduleStatus("Couldn't save. Try again.", true);
    } finally {
      btn.disabled = false;
      btn.textContent = 'Save';
    }
  }

  // Renders one row per known plant (anything logged, or already
  // in the plants table) with an editable interval + save button.
  function renderSchedule(plants, intervals){
    const known = new Map();
    for(const p of plants) known.set(p.plantId, p.interval);
    for(const id in intervals) if(!known.has(id)) known.set(id, intervals[id]);

    scheduleList.innerHTML = '';
    if(known.size === 0){
      scheduleList.innerHTML = '<div class="schedule-empty">No plants yet \u2014 add one below.</div>';
      return;
    }

    const sortedIds = [...known.keys()].sort((a, b) => prettifyPlantName(a).localeCompare(prettifyPlantName(b)));

    for(const plantId of sortedIds){
      const row = document.createElement('div');
      row.className = 'schedule-row';
      row.innerHTML = `
        <span class="schedule-name">${escapeHtml(prettifyPlantName(plantId))}</span>
        <input type="number" class="schedule-input" min="1" max="365" value="${known.get(plantId)}">
        <span class="schedule-unit">days</span>
        <button type="button" class="schedule-save-btn">Save</button>
      `;
      const input = row.querySelector('.schedule-input');
      const saveBtn = row.querySelector('.schedule-save-btn');
      saveBtn.addEventListener('click', () => saveInterval(plantId, parseInt(input.value, 10), saveBtn));
      scheduleList.appendChild(row);
    }
  }

  addPlantBtn.addEventListener('click', async () => {
    const plantId = sanitizePlantId(newPlantName.value);
    const days = parseInt(newPlantInterval.value, 10);

    if(!plantId){
      showScheduleStatus('Enter a plant name.', true);
      newPlantName.focus();
      return;
    }
    if(!days || days < 1){
      showScheduleStatus('Enter a number of days, 1 or more.', true);
      return;
    }

    addPlantBtn.disabled = true;
    try {
      const { error } = await supabaseClient
        .from('plants')
        .upsert({ plant_id: plantId, interval_days: days });
      if(error){
        console.error('Could not add plant:', error);
        showScheduleStatus("Couldn't add plant. Try again.", true);
      } else {
        showScheduleStatus(`Added ${prettifyPlantName(plantId)}.`, false);
        newPlantName.value = '';
        newPlantInterval.value = 3;
        loadDashboard();
      }
    } catch(err){
      console.error('Unexpected error adding plant:', err);
      showScheduleStatus("Couldn't add plant. Try again.", true);
    } finally {
      addPlantBtn.disabled = false;
    }
  });

  async function loadDashboard(){
    if(!isConfigured){
      renderConfigWarning();
      return;
    }

    try {
      // Logs and per-plant intervals load in parallel.
      const [logsResult, intervals] = await Promise.all([
        supabaseClient
          .from('watering_logs')
          .select('id, plant_id, created_at')
          .order('created_at', { ascending: false }),
        fetchPlantIntervals()
      ]);

      const { data, error } = logsResult;

      if(error){
        console.error('Supabase fetch error:', error);
        renderErrorState();
        renderSchedule([], intervals);
        return;
      }

      if(!data || data.length === 0){
        renderEmptyState();
        activitySection.style.display = 'none';
        renderSchedule([], intervals);
        return;
      }

      const plants = summarizePlants(data, intervals);
      renderDue(plants);
      renderPlants(plants);
      renderHeatmap(data);
      renderActivity(data);
      renderSchedule(plants, intervals);
    } catch(err){
      console.error('Unexpected error loading dashboard:', err);
      renderErrorState();
    }
  }

  refreshBtn.addEventListener('click', () => {
    refreshBtn.classList.add('spinning');
    loadDashboard().finally(() => refreshBtn.classList.remove('spinning'));
  });

  loadDashboard();
</script>

</body>
</html>
