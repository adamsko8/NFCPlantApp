<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#3c7a4c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="description" content="Tap to log that you watered this plant.">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" href="favicon.png">
<title>Plant Tracker</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="config.js"></script>

<div id="configBanner" class="config-banner" style="display:none;">
  Supabase isn't configured yet — edit the keys at the top of config.js.
</div>

<nav class="topnav">
  <a href="index.html" class="active">Log</a>
  <a href="dashboard.html">Dashboard</a>
  <a href="schedule.html">Schedule</a>
</nav>

<div class="screen">
  <div class="card">

    <div id="pickerStep" style="display:none; width:100%;">
      <div class="plant-label" style="margin-bottom:20px;">
        <span class="eyebrow">No tag detected</span>
        <span class="plant-name" style="font-size:16px;">Pick a plant, or type a new one</span>
      </div>
      <div id="plantChips" style="display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin-bottom:16px;"></div>
      <input type="text" id="plantInput" placeholder="e.g. the south lawn"
        style="width:100%; max-width:280px; padding:12px 16px; border-radius:12px; border:1px solid var(--card-border); font-size:16px; text-align:center; margin-bottom:14px;">
      <br>
      <button id="startBtn" type="button"
        style="background:var(--green-600); color:#fff; border:none; padding:10px 22px; border-radius:999px; font-size:14px; font-weight:600; cursor:pointer;">
        Start watering
      </button>
    </div>

    <div id="logStep" style="display:none; flex-direction:column; align-items:center; gap:28px;">
      <div class="plant-label">
        <span class="eyebrow">Now watering</span>
        <span class="plant-name" id="plantName">The South Lawn</span>
      </div>

      <div class="btn-wrap">
        <div class="pulse-ring" id="pulseRing"></div>
        <button id="logBtn" type="button" aria-label="Log watering for this plant">
          <span class="icon" id="btnIcon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M12 2C12 2 5 10.5 5 15C5 18.866 8.13401 22 12 22C15.866 22 19 18.866 19 15C19 10.5 12 2 12 2Z" fill="#ffffff"/>
            </svg>
          </span>
          <span id="btnLabel">Log watering</span>
        </button>
      </div>

      <div class="status-text" id="statusText" role="status" aria-live="polite">&nbsp;</div>
    </div>

  </div>
  <footer>NFC Plant Tracker &middot; MVP</footer>
</div>

<script>
  if(!isConfigured){
    document.getElementById('configBanner').style.display = 'block';
  }

  const pickerStep = document.getElementById('pickerStep');
  const logStep = document.getElementById('logStep');
  const plantInput = document.getElementById('plantInput');
  const startBtn = document.getElementById('startBtn');
  const plantNameEl = document.getElementById('plantName');
  const plantChips = document.getElementById('plantChips');

  const LAST_PLANT_KEY = 'plantTracker.lastPlant';

  let active_plant_id = getActivePlantId();

  function showLogStep(plantId){
    active_plant_id = plantId;
    plantNameEl.textContent = prettifyPlantName(plantId);
    pickerStep.style.display = 'none';
    logStep.style.display = 'flex';
  }

  // Renders tappable chips for plants you've logged before, so
  // repeat visits don't require retyping a name. Falls back to
  // localStorage's last-used plant if the database fetch fails or
  // isn't configured yet, and pre-fills the text box either way.
  async function loadQuickPicks(){
    const lastPlant = localStorage.getItem(LAST_PLANT_KEY);
    let names = [];

    if(isConfigured){
      try {
        const [logsResult, plantsResult] = await Promise.all([
          supabaseClient
            .from('watering_logs')
            .select('plant_id')
            .order('created_at', { ascending: false })
            .limit(200),
          supabaseClient
            .from('plants')
            .select('plant_id')
        ]);

        const fromLogs = (!logsResult.error && logsResult.data)
          ? logsResult.data.map(r => r.plant_id) : [];
        const fromSchedule = (!plantsResult.error && plantsResult.data)
          ? plantsResult.data.map(r => r.plant_id) : [];

        // Logged plants first (most-recent order preserved), then any
        // schedule-only plants that haven't been watered yet.
        const seen = new Set();
        names = [];
        for(const id of [...fromLogs, ...fromSchedule]){
          if(!seen.has(id)){
            seen.add(id);
            names.push(id);
          }
        }
        names = names.slice(0, 8);
      } catch(err){
        console.error('Could not load past plants:', err);
      }
    }

    if(names.length === 0){
      plantChips.style.display = 'none';
    } else {
      plantChips.innerHTML = '';
      for(const name of names){
        const chip = document.createElement('button');
        chip.type = 'button';
        chip.textContent = prettifyPlantName(name);
        chip.style.cssText = 'background:#fff; border:1px solid var(--card-border); color:var(--green-700); padding:8px 16px; border-radius:999px; font-size:14px; font-weight:600; cursor:pointer;';
        chip.addEventListener('click', () => showLogStep(name));
        plantChips.appendChild(chip);
      }
    }

    if(lastPlant && !plantInput.value){
      plantInput.value = lastPlant;
    }
  }

  if(hasPlantParam()){
    // Real NFC tap — skip straight to the button.
    showLogStep(active_plant_id);
  } else {
    // Bare link with no tag info — ask for a name first.
    pickerStep.style.display = 'block';
    logStep.style.display = 'none';
    loadQuickPicks();
  }

  startBtn.addEventListener('click', () => {
    const typed = sanitizePlantId(plantInput.value);
    if(!typed){
      plantInput.focus();
      plantInput.style.borderColor = '#b3392f';
      return;
    }
    showLogStep(typed);
  });

  plantInput.addEventListener('keydown', (e) => {
    if(e.key === 'Enter') startBtn.click();
  });

  const logBtn = document.getElementById('logBtn');
  const btnIcon = document.getElementById('btnIcon');
  const btnLabel = document.getElementById('btnLabel');
  const statusText = document.getElementById('statusText');
  const pulseRing = document.getElementById('pulseRing');

  const DROP_ICON = `
    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 2C12 2 5 10.5 5 15C5 18.866 8.13401 22 12 22C15.866 22 19 18.866 19 15C19 10.5 12 2 12 2Z" fill="#ffffff"/>
    </svg>`;

  const SPINNER = `<div class="spinner"></div>`;

  const CHECK_ICON = `
    <svg class="checkmark" viewBox="0 0 52 52">
      <circle cx="26" cy="26" r="23"/>
      <path d="M14 27 L22 35 L38 17"/>
    </svg>`;

  const ERROR_ICON = `
    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <line x1="6" y1="6" x2="18" y2="18" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
      <line x1="18" y1="6" x2="6" y2="18" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
    </svg>`;

  let busy = false;

  function setState(state){
    logBtn.classList.remove('loading', 'success', 'error');
    if(state === 'loading'){
      logBtn.classList.add('loading');
      logBtn.disabled = true;
      btnIcon.innerHTML = SPINNER;
      btnLabel.textContent = 'Logging...';
      statusText.textContent = '\u00A0';
      statusText.className = 'status-text';
    } else if(state === 'success'){
      logBtn.classList.add('success');
      btnIcon.innerHTML = CHECK_ICON;
      btnLabel.textContent = 'Watered!';
      statusText.textContent = 'Nice work \u2014 logged just now.';
      statusText.className = 'status-text success';
      pulseRing.classList.remove('active');
      void pulseRing.offsetWidth;
      pulseRing.classList.add('active');
    } else if(state === 'error'){
      logBtn.classList.add('error');
      btnIcon.innerHTML = ERROR_ICON;
      btnLabel.textContent = 'Try again';
      statusText.textContent = 'Something went wrong. Please try again.';
      statusText.className = 'status-text error';
    } else {
      btnIcon.innerHTML = DROP_ICON;
      btnLabel.textContent = 'Log watering';
      statusText.textContent = '\u00A0';
      statusText.className = 'status-text';
    }
    logBtn.disabled = (state === 'loading');
  }

  async function logWatering(){
    if(busy) return;

    if(!isConfigured){
      setState('error');
      statusText.textContent = "Supabase isn't configured yet. See config.js.";
      setTimeout(() => setState('default'), 3000);
      return;
    }

    busy = true;
    setState('loading');

    try {
      const { error } = await supabaseClient
        .from('watering_logs')
        .insert([{ plant_id: active_plant_id }]);

      if(error){
        console.error('Supabase insert error:', error);
        setState('error');
        setTimeout(() => {
          setState('default');
          busy = false;
        }, 3000);
      } else {
        localStorage.setItem(LAST_PLANT_KEY, active_plant_id);
        setState('success');
        setTimeout(() => {
          window.location.href = 'dashboard.html';
        }, 1400);
      }
    } catch(err){
      console.error('Unexpected error logging watering:', err);
      setState('error');
      setTimeout(() => {
        setState('default');
        busy = false;
      }, 3000);
    }
  }

  logBtn.addEventListener('click', logWatering);

  setState('default');
</script>

</body>
</html>
